name: Rust Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install system dependencies
      run: |
        brew update
        brew install pkg-config

    - name: Rust toolchain info
      run: |
        rustc --version
        cargo --version

    - name: Show environment info
      run: |
        echo "GITHUB event: ${{ github.event_name }}"
        echo "GITHUB ref: ${{ github.ref }}"
        echo "GITHUB workspace: ${{ github.workspace }}"

    - name: Build (Release)
      run: cargo build --release --verbose

    - name: Run tests
      run: cargo test --verbose

    - name: Collect artifacts
      run: |
        mkdir -p artifacts
        cp target/release/clicker artifacts/
        ls -la artifacts/
        file artifacts/clicker

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: clicker-macos-arm64
        path: artifacts/clicker
        retention-days: 7

  release:
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download built artifact
      uses: actions/download-artifact@v4
      with:
        name: clicker-macos-arm64
        path: .

    - name: Verify artifact
      run: |
        ls -la clicker
        file clicker
        ./clicker --version 2>&1 || echo "No version flag (ok)"

    - name: Get version info
      id: version
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "tag=nightly-${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "Binary built from commit: ${SHORT_SHA}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: clicker
        tag_name: nightly-${{ steps.version.outputs.version }}
        name: "Nightly Build (${{ steps.version.outputs.version }})"
        prerelease: true
        generate_release_notes: true